<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Sofía · Tutora IA · 1º ESO Madrid</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Sofía IA">
<meta name="theme-color" content="#0f0e17">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%230f0e17'/%3E%3Ccircle cx='90' cy='90' r='70' fill='url(%23g)'/%3E%3Cdefs%3E%3CradialGradient id='g' cx='40%25' cy='40%25'%3E%3Cstop offset='0' stop-color='%23ff6b6b'/%3E%3Cstop offset='1' stop-color='%23ffd166'/%3E%3C/radialGradient%3E%3C/defs%3E%3Ctext x='90' y='115' font-size='80' text-anchor='middle'%3E%F0%9F%8E%93%3C/text%3E%3C/svg%3E">
<style>
/* ── ALL ORIGINAL STYLES PRESERVED ── */
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; }
body { display: flex; flex-direction: column; height: 100vh; height: 100dvh; background: #0f0e17; color: #fffffe; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; position: fixed; width: 100%; top: 0; left: 0; }
#header { flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 10px 14px; border-bottom: 1px solid #2a2945; background: #13121f; gap: 8px; }
.hlogo { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }
.avatar { width: 38px; height: 38px; border-radius: 50%; background: linear-gradient(135deg, #ff6b6b, #ffd166); display: flex; align-items: center; justify-content: center; font-size: 18px; }
.hname { font-weight: 700; font-size: 15px; }
.hstatus { font-size: 11px; color: #7a79a0; display: flex; align-items: center; gap: 4px; }
.dot { width: 6px; height: 6px; background: #06d6a0; border-radius: 50%; animation: pulse 2s infinite; }
.header-right { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; justify-content: flex-end; }
.pills { display: flex; gap: 4px; flex-wrap: wrap; justify-content: flex-end; }
.pill { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #2a2945; background: transparent; color: #7a79a0; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
.pill.active { border-color: #ff6b6b; background: rgba(255,107,107,0.12); color: #ff6b6b; }
#examBtn { font-size: 11px; padding: 4px 10px; border-radius: 20px; border: 1px solid #2a2945; background: transparent; color: #7a79a0; cursor: pointer; white-space: nowrap; -webkit-tap-highlight-color: transparent; transition: all 0.2s; }
#examBtn.active { border-color: #ffd166; background: rgba(255,209,102,0.12); color: #ffd166; }
#examBanner { display: none; flex-shrink: 0; background: rgba(255,209,102,0.08); border-bottom: 1px solid rgba(255,209,102,0.2); padding: 8px 14px; font-size: 13px; color: #ffd166; text-align: center; }
#chat { flex: 1; overflow-y: auto; padding: 14px; display: flex; flex-direction: column; gap: 12px; scroll-behavior: smooth; }
#chat::-webkit-scrollbar { width: 3px; }
#chat::-webkit-scrollbar-thumb { background: #2a2945; border-radius: 3px; }
.msg { display: flex; gap: 8px; max-width: 88%; }
.msg.user { align-self: flex-end; flex-direction: row-reverse; }
.msg.ai { align-self: flex-start; }
.msg-av { width: 30px; height: 30px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 14px; margin-top: 2px; }
.msg.ai .msg-av { background: linear-gradient(135deg, #ff6b6b, #ffd166); }
.msg.user .msg-av { background: #1e1e35; border: 1px solid #2a2945; }
.bubble { padding: 11px 15px; font-size: 16px; line-height: 1.7; border-radius: 16px; animation: fadeUp 0.25s ease; }
.msg.ai .bubble { background: #1a1935; border: 1px solid #2a2945; border-bottom-left-radius: 3px; }
.msg.user .bubble { background: #252440; border: 1px solid rgba(255,107,107,0.25); border-bottom-right-radius: 3px; }
.bubble b { color: #ffd166; }
.bubble em { color: #06d6a0; }
.date-divider { text-align: center; font-size: 11px; color: #4a4970; margin: 4px 0; flex-shrink: 0; }
.typing-dots { display: flex; gap: 4px; padding: 4px 0; }
.typing-dots span { width: 7px; height: 7px; background: #7a79a0; border-radius: 50%; display: inline-block; animation: bounce 1.2s infinite; }
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
#chips { flex-shrink: 0; display: flex; flex-wrap: wrap; gap: 7px; padding: 0 14px 8px; }
.chip { font-size: 13px; padding: 8px 14px; border-radius: 20px; background: #1a1935; border: 1px solid #2a2945; color: #7a79a0; cursor: pointer; transition: all 0.2s; -webkit-tap-highlight-color: transparent; }
#footer { flex-shrink: 0; padding: 8px 14px 12px; padding-bottom: max(12px, env(safe-area-inset-bottom)); border-top: 1px solid #2a2945; background: #13121f; }
#input-row { display: flex; gap: 8px; align-items: flex-end; }
textarea { flex: 1; height: 44px; min-height: 44px; max-height: 120px; background: #1a1935; border: 1px solid #2a2945; border-radius: 12px; padding: 12px 14px; color: #fffffe; font-family: inherit; font-size: 16px; resize: none; outline: none; line-height: 1.4; transition: border-color 0.2s; }
#sendBtn { width: 44px; height: 44px; border-radius: 12px; flex-shrink: 0; background: linear-gradient(135deg, #ff6b6b, #ff8e53); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 12px rgba(255,107,107,0.3); transition: all 0.2s; }
#sendBtn:disabled { background: #2a2945; box-shadow: none; cursor: default; }
#historyPanel { display: none; position: fixed; inset: 0; z-index: 150; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px); }
#historyDrawer { position: absolute; top: 0; right: 0; bottom: 0; width: min(320px, 90vw); background: #13121f; border-left: 1px solid #2a2945; display: flex; flex-direction: column; padding: 20px 16px; overflow-y: auto; gap: 10px; }
.session-item { background: #1a1935; border: 1px solid #2a2945; border-radius: 12px; padding: 12px 14px; cursor: pointer; transition: all 0.2s; }
@keyframes bounce { 0%,60%,100%{transform:translateY(0)} 30%{transform:translateY(-6px)} }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
@keyframes fadeUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
</style>
</head>
<body>

<div id="historyPanel" onclick="closeHistory(event)">
  <div id="historyDrawer">
    <button onclick="document.getElementById('historyPanel').style.display='none'" style="background:none;border:none;color:#7a79a0;font-size:22px;cursor:pointer;align-self:flex-end;">✕</button>
    <h3>📚 Historial</h3>
    <div id="sessionList"></div>
    <button onclick="clearAllSessions()" style="margin-top:12px;padding:10px;border-radius:10px;background:transparent;border:1px solid #2a2945;color:#7a79a0;font-size:13px;cursor:pointer;">Borrar todo</button>
  </div>
</div>

<div id="header">
  <div class="hlogo">
    <div class="avatar">🎓</div>
    <div>
      <div class="hname">Sofía · Tutora IA</div>
      <div class="hstatus"><span class="dot"></span>1º ESO · Madrid</div>
    </div>
  </div>
  <div class="header-right">
    <div class="pills">
      <button class="pill active" onclick="setPill(this,'Matemáticas')">Mates</button>
      <button class="pill" onclick="setPill(this,'Biología')">Bio</button>
      <button class="pill" onclick="setPill(this,'Historia')">Historia</button>
    </div>
    <button id="examBtn" onclick="toggleExam()">📝 Exam</button>
    <button onclick="deleteConversation()" style="font-size:16px;background:transparent;border:none;cursor:pointer;color:#7a79a0;padding:2px 4px;">🗑️</button>
    <button onclick="showHistory()" style="font-size:18px;background:transparent;border:none;cursor:pointer;color:#7a79a0;padding:2px 4px;">🕘</button>
  </div>
</div>

<div id="examBanner">📝 <b>Modo Examen Activo</b></div>

<div id="chat"></div>

<div id="chips">
  <button class="chip" onclick="sendChip(this)">Fracciones</button>
  <button class="chip" onclick="sendChip(this)">Fotosíntesis</button>
  <button class="chip" onclick="sendChip(this)">📝 Empezar examen</button>
</div>

<div id="footer">
  <div id="input-row">
    <textarea id="ta" placeholder="Escribe tu pregunta aquí..." onkeydown="onKey(event)" oninput="resizeTA(this)"></textarea>
    <button id="sendBtn" onclick="sendMsg()" disabled>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="white"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/></svg>
    </button>
  </div>
</div>

<script>
// ── CONFIG ──
const WORKER_URL = 'https://sofia-tutor.roi-abre.workers.dev/message';
const SYSTEM_NORMAL = `Eres Sofía, una tutora privada experta y empática para 1º ESO en Madrid. Usa el método socrático. Sé breve y concisa (máximo 3-4 líneas).`;
const SYSTEM_EXAM = `Eres Sofía en MODO EXAMEN. Haz preguntas tipo examen una a una. Corrige después de cada respuesta.`;

// ── STATE ──
let history = [];
let subject = 'Matemáticas';
let loading = false;
let examMode = false;

// ── CORE LOGIC ──
async function sendMsg(txt) {
  if (loading) return;
  const ta = document.getElementById('ta');
  const text = (txt || ta.value).trim();
  if (!text) return;

  ta.value = '';
  resizeTA(ta);
  document.getElementById('chips').style.display = 'none';
  
  addMsg('user', text);
  history.push({ role: 'user', content: text });
  
  loading = true;
  updateSendBtn();
  showTyping();

  try {
    const currentSystem = examMode ? SYSTEM_EXAM : SYSTEM_NORMAL;
    const res = await fetch('https://sofia-tutor.roi-abre.workers.dev', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ 
        system: `${currentSystem} Asignatura: ${subject}`, 
        messages: history,
        userId: "estudiante_madrid_01" 
      })
    });

    const data = await res.json();
    const reply = data.content[0].text;
    
    hideTyping();
    addMsg('ai', reply);
    history.push({ role: 'assistant', content: reply });
    saveSession();
  } catch (err) {
    hideTyping();
    addMsg('ai', "⚠️ Error: No he podido conectar con mi cerebro artificial.");
  }

  loading = false;
  updateSendBtn();
}

function addMsg(role, text) {
  const chat = document.getElementById('chat');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  wrap.innerHTML = `<div class="msg-av">${role==='ai'?'🎓':'👩‍🎓'}</div><div class="bubble">${text.replace(/\n/g, '<br>')}</div>`;
  chat.appendChild(wrap);
  chat.scrollTop = chat.scrollHeight;
}

function showTyping() {
  const wrap = document.createElement('div');
  wrap.className = 'msg ai'; wrap.id = 'typing';
  wrap.innerHTML = `<div class="msg-av">🎓</div><div class="bubble"><div class="typing-dots"><span></span><span></span><span></span></div></div>`;
  document.getElementById('chat').appendChild(wrap);
}

function hideTyping() { document.getElementById('typing')?.remove(); }

function toggleExam() {
  examMode = !examMode;
  document.getElementById('examBtn').classList.toggle('active', examMode);
  document.getElementById('examBanner').style.display = examMode ? 'block' : 'none';
  addMsg('ai', examMode ? "🎯 ¡Modo Examen activado! ¿Qué tema practicamos?" : "✅ Volvemos al modo normal.");
}

function setPill(el, s) {
  document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  subject = s;
  addMsg('ai', `📚 ¡Vale! Vamos con **${s}**.`);
}

function onKey(e) { if (e.key==='Enter' && !e.shiftKey) { e.preventDefault(); sendMsg(); } }
function resizeTA(el) { el.style.height='44px'; el.style.height=Math.min(el.scrollHeight, 120)+'px'; updateSendBtn(); }
function updateSendBtn() { document.getElementById('sendBtn').disabled = loading || !document.getElementById('ta').value.trim(); }
function sendChip(el) { sendMsg(el.textContent); }
function deleteConversation() { if(confirm('¿Borrar chat?')){ document.getElementById('chat').innerHTML=''; history=[]; showWelcome(); } }

// ── MEMORY ──
function saveSession() {
  const sessions = JSON.parse(localStorage.getItem('sofia_sessions') || '[]');
  sessions.unshift({ date: new Date().toISOString(), subject, history });
  localStorage.setItem('sofia_sessions', JSON.stringify(sessions.slice(0, 10)));
}

function showHistory() {
  const list = document.getElementById('sessionList');
  const sessions = JSON.parse(localStorage.getItem('sofia_sessions') || '[]');
  list.innerHTML = sessions.map((s, i) => `<div class="session-item" onclick="loadSession(${i})"><b>${new Date(s.date).toLocaleDateString()}</b> - ${s.subject}</div>`).join('') || "No hay historial.";
  document.getElementById('historyPanel').style.display = 'block';
}

function loadSession(i) {
  const s = JSON.parse(localStorage.getItem('sofia_sessions'))[i];
  history = s.history; document.getElementById('chat').innerHTML = '';
  history.forEach(m => addMsg(m.role==='assistant'?'ai':'user', m.content));
  document.getElementById('historyPanel').style.display = 'none';
}

function showWelcome() { addMsg('ai', "¡Hola! 👋 Soy Sofía. ¿Qué vamos a aprender hoy?"); }
window.onload = showWelcome;
</script>
</body>
</html>
