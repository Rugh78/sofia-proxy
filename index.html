<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sofia Tutor</title>
    <style>
        body { font-family: sans-serif; max-width: 600px; margin: 50px auto; }
        #chat { height: 300px; border: 1px solid #ccc; overflow-y: scroll; padding: 10px; margin-bottom: 10px; }
        input { width: 80%; padding: 10px; }
        button { padding: 10px; }
    </style>
</head>
<body>
    <h1>Chat with Sofia</h1>
    <div id="chat"></div>
    <input type="text" id="userInput" placeholder="Ask something...">
    <button onclick="sendMessage()">Send</button>

    <script>
        async function sendMessage() {
            const input = document.getElementById('userInput');
            const chat = document.getElementById('chat');
            const userText = input.value;
            
            chat.innerHTML += `<div><b>You:</b> ${userText}</div>`;
            input.value = '';

            const response = await fetch('https://sofia-tutor.YOUR_SUBDOMAIN.workers.dev/message', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    userId: "student_001",
                    system: "You are Sofia, a helpful tutor.",
                    messages: [{ role: "user", content: userText }]
                })
            });

            const data = await response.json();
            const aiText = data.content[0].text;
            chat.innerHTML += `<div><b>Sofia:</b> ${aiText}</div>`;
        }
    </script>
</body>
</html>
